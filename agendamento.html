<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendamento - CRAS</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="header-principal">
  <div class="container-fluid header-content">

    <div class="logo-section">
      <div class="logo">
        <i class="fas fa-hands-helping"></i>
      </div>
      <div class="logo-text">
        <h1>CRAS</h1>
        <p>Centro de Referência de Assistência Social</p>
      </div>
    </div>

    <nav class="nav-principal">
      <a href="index.html" class="nav-link">Início</a>
      <a href="sobre.html" class="nav-link">Sobre</a>
      <a href="servicos.html" class="nav-link">Serviços</a>
      <a href="agendamento.html" class="nav-link active">Agendamento</a>
      <a href="consulta.html" class="nav-link">Consultar</a>
    </nav>

  </div>
</header>

<section class="agendamento">
  <div class="container-fluid">
    <div class="section-header">
      <h2>Agendar Atendimento</h2>
      <p>Preencha os dados abaixo para realizar seu agendamento</p>
    </div>

    <div class="form-agendamento" style="max-width:700px;margin:0 auto;">

      <form id="formAgendamento">

        <div class="form-group">
          <label for="nome">Nome Completo *</label>
          <input type="text" id="nome" name="nome" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cpf">CPF *</label>
            <input type="text" id="cpf" name="cpf" required>
          </div>

          <div class="form-group">
            <label for="telefone">Telefone *</label>
            <input type="tel" id="telefone" name="telefone" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="data">Data do Atendimento *</label>
            <input type="date" id="data" name="data" required>
          </div>

          <div class="form-group">
            <label for="hora">Horário *</label>
            <select id="hora" name="hora" required>
              <option value="">Selecione um horário</option>
              <option value="08:00">08:00</option>
              <option value="09:00">09:00</option>
              <option value="10:00">10:00</option>
              <option value="14:00">14:00</option>
              <option value="15:00">15:00</option>
              <option value="16:00">16:00</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="servico">Tipo de Atendimento *</label>
          <select id="servico" name="servico" required>
            <option value="">Selecione o serviço</option>
            <option value="cadastro">Cadastro Único</option>
            <option value="acompanhamento">Acompanhamento Familiar</option>
            <option value="educacao">Programa Educacional</option>
            <option value="encaminhamento">Encaminhamento</option>
          </select>
        </div>

        <div class="form-group">
          <label for="observacoes">Observações</label>
          <textarea id="observacoes" name="observacoes" rows="4"></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-check"></i> Confirmar Agendamento
        </button>

      </form>

    </div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
